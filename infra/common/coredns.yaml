apiVersion: v1
data:
  Corefile: |
    .:53 {
        hosts {
          192.168.1.30 registry.internal.example.com
          192.168.1.19 registry.workload.example.com
          192.168.1.19 keycloak.workload.example.com
          192.168.1.30 gitea.example.com
          192.168.1.30 keycloak.mgmt.example.com
          fallthrough
        }
        errors
        health {
           lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        prometheus :9153
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system