---
# Horizontal Pod Autoscaler for API service
# Requires metrics-server: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tak-api-hpa
  namespace: tak-server
  labels:
    app.kubernetes.io/name: tak-server
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tak-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# Horizontal Pod Autoscaler for Messaging service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tak-messaging-hpa
  namespace: tak-server
  labels:
    app.kubernetes.io/name: tak-server
    app.kubernetes.io/component: messaging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tak-messaging
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# NetworkPolicy — default-deny all ingress within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: tak-server
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow Postgres to receive connections only from TAK Server pods and schema manager
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-tak
  namespace: tak-server
spec:
  podSelector:
    matchLabels:
      app: tak-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: tak-server
      ports:
        - port: 5432
---
# Allow TAK Config inbound Ignite discovery traffic from other TAK pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ignite-internal
  namespace: tak-server
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tak-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: tak-server
      ports:
        - port: 47500
        - port: 47100
---
# Allow external traffic to Messaging ports
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-messaging-external
  namespace: tak-server
spec:
  podSelector:
    matchLabels:
      app: tak-messaging
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8087
          protocol: TCP
        - port: 8087
          protocol: UDP
        - port: 8089
          protocol: TCP
---
# Allow external HTTPS traffic to API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-external
  namespace: tak-server
spec:
  podSelector:
    matchLabels:
      app: tak-api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
        - port: 8443
        - port: 8444
