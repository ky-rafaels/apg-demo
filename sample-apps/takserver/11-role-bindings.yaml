apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tak-ignite-discovery
  namespace: tak-server
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tak-ignite-discovery
  namespace: tak-server
subjects:
  - kind: ServiceAccount
    name: tak-server-sa
    namespace: tak-server
roleRef:
  kind: Role
  name: tak-ignite-discovery
  apiGroup: rbac.authorization.k8s.io