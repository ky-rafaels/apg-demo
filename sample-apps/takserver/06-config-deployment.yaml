---
# TAK Server — Configuration Microservice
# Must start first; Messaging and API depend on it.
# Spring profile: config
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tak-config
  namespace: tak-server
  labels:
    app.kubernetes.io/name: tak-server
    app.kubernetes.io/component: config
spec:
  replicas: 1   # Config service should be a singleton
  selector:
    matchLabels:
      app: tak-config
  strategy:
    type: Recreate   # Ensures single instance; avoids split-brain
  template:
    metadata:
      labels:
        app: tak-config
        app.kubernetes.io/name: tak-server
        app.kubernetes.io/component: config
    spec:
      serviceAccountName: tak-server-sa
      terminationGracePeriodSeconds: 60
      restartPolicy: OnFailure
      containers:
        - name: tak-config
          # Replace with your actual TAK Server WAR image.
          # Build locally from src/ or obtain from tak.gov / Iron Bank.
          image: ghcr.io/tak-product-center/takserver-core:latest
          imagePullPolicy: IfNotPresent
          command:
            - java
            - -server
            - -XX:+AlwaysPreTouch
            - -XX:+UseG1GC
            - -XX:+ScavengeBeforeFullGC
            - -XX:+DisableExplicitGC
            - -Xmx1g
            - -Dspring.profiles.active=config
            - -Djava.net.preferIPv4Stack=true
            - -Djava.security.egd=file:/dev/./urandom
            - -DIGNITE_UPDATE_NOTIFIER=false
            - -DIGNITE_QUIET=true
            - --add-opens=java.base/sun.security.pkcs=ALL-UNNAMED
            - --add-opens=java.base/sun.security.pkcs10=ALL-UNNAMED
            - --add-opens=java.base/sun.security.util=ALL-UNNAMED
            - --add-opens=java.base/sun.security.x509=ALL-UNNAMED
            - --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED
            - --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
            - --add-opens=java.base/java.io=ALL-UNNAMED
            - --add-opens=java.base/java.nio=ALL-UNNAMED
            - --add-opens=java.base/java.util=ALL-UNNAMED
            - --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
            - --add-opens=java.base/java.lang=ALL-UNNAMED
            - --add-opens=jdk.unsupported/sun.misc=ALL-UNNAMED
            - -jar
            - /opt/tak/takserver-core.war
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: tak-server-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tak-server-secret
                  key: DB_PASSWORD
            - name: IGNITE_HOME
              value: /opt/tak/ignite
          ports:
            - name: ignite-disc
              containerPort: 47500
            - name: ignite-comm
              containerPort: 47100
          volumeMounts:
            - name: tak-config
              mountPath: /opt/tak/CoreConfig.xml
              subPath: CoreConfig.xml
            - name: tak-ignite-config
              mountPath: /opt/tak/TAKIgniteConfig.xml
              subPath: TAKIgniteConfig.xml
            - name: tak-certs
              mountPath: /opt/tak/certs
            - name: tak-logs
              mountPath: /opt/tak/logs
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: ignite-disc
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: ignite-disc
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: tak-config
          configMap:
            name: tak-server-config
            items:
              - key: CoreConfig.xml
                path: CoreConfig.xml
        - name: tak-ignite-config
          configMap:
            name: tak-server-config
            items:
              - key: TAKIgniteConfig.xml
                path: TAKIgniteConfig.xml
        - name: tak-certs
          persistentVolumeClaim:
            claimName: tak-certs-pvc
        - name: tak-logs
          persistentVolumeClaim:
            claimName: tak-logs-pvc
---
# Headless service for Ignite peer discovery
apiVersion: v1
kind: Service
metadata:
  name: tak-ignite-discovery
  namespace: tak-server
  labels:
    app.kubernetes.io/name: tak-server
    app.kubernetes.io/component: config
spec:
  selector:
    app: tak-config
  clusterIP: None
  ports:
    - name: ignite-disc
      port: 47500
      targetPort: 47500
    - name: ignite-comm
      port: 47100
      targetPort: 47100
