apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- httpbin.yaml
- httpbin-route.yaml

patches:
- target:
    kind: Ingress
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: "httpbin.10.38.207.151.nip.io"
    - op: replace
      path: /spec/tls/0/hosts
      value: ["httpbin.10.38.207.151.nip.io"]
